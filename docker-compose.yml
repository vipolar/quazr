services:
    postgres:
        image: postgres:16
        restart: unless-stopped
        container_name: quazr-postgres
        ports:
            - "${POSTGRES_PORT}:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - ./quazr-data:/var/lib/postgresql/data
            - ./quazr-db/init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            start_period: 30s
            interval: 15s
            timeout: 5s
            retries: 5
        networks:
            - quazr-network

    postgres-migrator:
        image: postgres:16
        container_name: quazr-postgres-migrator
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            PGPASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - ./quazr-db/migrations:/migrations:ro
        entrypoint: ["/bin/sh", "-c"]
        command: |
            '
            set -e
            echo "Waiting for Postgres..."
            # pg_isready is already available in the image via depends_on healthcheck
            echo "Applying migrations..."
            for f in /migrations/*.sql; do
                echo "Running $$f"
                psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -v ON_ERROR_STOP=1 -f "$$f"
            done
            echo "Migrations complete."
            '
        networks:
            - quazr-network

    postgres-admin:
        image: dpage/pgadmin4:9.12
        restart: unless-stopped
        container_name: quazr-postgres-admin
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./quazr-adminboard/servers.json:/pgadmin4/servers.json:rw
            - ./quazr-adminboard:/var/lib/pgadmin:rw
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
            PGADMIN_DISABLE_POSTFIX: true
            PGADMIN_LISTEN_PORT: 15432
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --spider --timeout=10 --tries=0 http://localhost:15432/misc/ping"]
            start_period: 60s
            interval: 60s
            timeout: 10s
            retries: 3
        ports:
            - ${PGADMIN_PORT}:15432
        networks:
            - quazr-network

    springboot-backend:
        user: 1000:1000
        image: openjdk:17
        container_name: quazr-springboot-dev
        entrypoint: ["./mvnw", "spring-boot:run", "-Dmaven.repo.local=./.repository"]
        working_dir: /application
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            #keycloak:
        volumes:
            - ./quazr-backend:/application:rw
            - ./quazr-backend/.repository:/application/.repository
        environment:
            HOME: /application
            BE_DATABASE_URL: ${BE_DATABASE_URL}
            BE_DATABASE_PORT: ${BE_DATABASE_PORT}
            BE_DATABASE_NAME: ${BE_DATABASE_NAME}
            BE_DATABASE_USER: ${BE_DATABASE_USER}
            BE_DATABASE_PASS: ${BE_DATABASE_PASS}
            BE_JPA_SHOW_SQL: ${BE_JPA_SHOW_SQL}
            BE_CONTEXT_PATH: ${BE_CONTEXT_PATH}
            BE_PORT: ${BE_PORT}
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet --spider --timeout=10 --tries=0 http://localhost:${BE_PORT}"]
            start_period: 160s
            interval: 60s
            timeout: 10s
            retries: 3
        ports:
            - ${BE_PORT}:${BE_PORT}
        networks:
            - quazr-network

    svelte-kit:
        user: node
        image: node:20-alpine
        restart: unless-stopped
        container_name: quazr-sveltekit-dev
        depends_on:
            postgres:
                condition: service_healthy
        working_dir: /home/node/app
        volumes:
            - ./quazr-sk:/home/node/app
            - ./quazr-sk/node_modules:/home/node/app/node_modules
        command: sh -c "npm ci && npm run dev"
        environment:
            npm_config_cache: /home/node/.npm
            NODE_ENV: development
            HOME: /home/node
            CHOKIDAR_USEPOLLING: "true"
            VITE_FORCE_HMR: "true"
            PUBLIC_BE_API: ${BE_PUBLIC_API}
            BE_HOST: springboot-backend
            BE_PORT: ${BE_PORT}
        ports:
            - "${VHMR_PORT}:24678"
            - "${SV_PORT}:5173"
        networks:
            - quazr-network

    caddy:
        image: caddy:latest
        restart: unless-stopped
        container_name: quazr-caddy-server
        volumes:
            - ./quazr-caddy/Caddyfile:/etc/caddy/Caddyfile
            - ./quazr-caddy/config:/config
            - ./quazr-caddy/data:/data
        networks:
            - quazr-network
        ports:
            - 443:443
            - 80:80

networks:
    quazr-network:
        driver: bridge